<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://serpwiser.com/" />
    <meta name="description" content="SERP Wiser - Digital marketing that drives. SEO, content marketing, social media, PPC, and web design. Grow traffic, leads, and revenue." />
    <meta name="keywords" content="digital marketing, SEO agency, content marketing, PPC, social media marketing, web design, SERP Wiser" />
    <meta name="robots" content="index, follow" />
    <style>
      /* Critical CSS: first paint + LCP (hero) - keeps main CSS off critical path */
      html{scroll-behavior:smooth}
      body{margin:0;font-family:"Plus Jakarta Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#0f172a;background:#0f172a}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .skip-link{position:absolute;top:-100px;left:50%;transform:translateX(-50%);z-index:9999;padding:.75rem 1.5rem;background:#0f172a;color:#fff;font-weight:600;border-radius:.5rem}
      .skip-link:focus{top:1rem;outline:2px solid #0ea5e9;outline-offset:2px}
      /* Hero / LCP - above-the-fold only; full styles from main CSS */
      .hero-banner{min-height:90vh;display:flex;align-items:center;overflow:hidden;background:#0f172a}
      .hero-banner .relative{position:relative;max-width:80rem;margin:0 auto;padding:6rem 1rem;width:100%}
      .hero-banner h1{font-size:clamp(2.25rem,5vw,4rem);font-weight:700;color:#fff;line-height:1.1;letter-spacing:-0.02em}
      .hero-banner p{color:#e2e8f0}
      .hero-banner input{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:.75rem;padding:1rem 1.25rem}
      .hero-banner button.rounded-xl{border-radius:.75rem;padding:1rem 2rem;font-weight:700}
      /* Nav bar - first paint only */
      .site-header.fixed{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(24px);border-bottom:1px solid rgba(226,232,240,.6)}
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" /></noscript>
    <title>SERP Wiser | Digital Marketing That Drives</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link" style="position:absolute;top:-100px;left:50%;transform:translateX(-50%);z-index:9999">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
